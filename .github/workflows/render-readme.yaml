on:
  push:
    branches:
      - master

name: Render README

jobs:
  render:
    name: Render README
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v2
      - uses: r-lib/actions/setup-r@master
      - uses: r-lib/actions/setup-pandoc@master
      - name: Install rmarkdown
        run: Rscript -e 'install.packages(c("rmarkdown", "gifski", "glue"), dependencies = TRUE)'
      - name: Render README
        run: Rscript -e 'rmarkdown::render("README.Rmd")'
      - name: Commit README
        run: |
          git commit README.md -m 'Re-build README.Rmd' || echo "No changes to commit"
          git commit hex-stickers.gif -m 'Re-build README.Rmd' || echo "No changes to commit"
      - name: Render README PNG
        run: Rscript -e 'rmarkdown::render("PNG/README.Rmd")'
      - name: Commit README PNG
        run: |
          git commit PNG/README.md -m 'Re-build PNG/README.Rmd' || echo "No changes to commit"
      - name: Push results
        run: |
          git push || echo "No changes to commit"
